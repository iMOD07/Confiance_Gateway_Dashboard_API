# ===== SERVER =====
server.port=8080
spring.application.name=confiance-gateway

# ===== PostgreSQL =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/confiance_gateway}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true

# ===== JWT =====
# MUST override in production via environment variable JWT_SECRET
jwt.secret=${JWT_SECRET:Y29uZmlhbmNlLWdhdGV3YXktc2VjcmV0LWtleS1jaGFuZ2UtaW4tcHJvZHVjdGlvbi0yMDI2}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===== ADMIN SEED =====
confiance.admin.username=${ADMIN_USERNAME:Admin_Con}
confiance.admin.password=${ADMIN_PASSWORD:Con@2301}
confiance.admin.email=${ADMIN_EMAIL:admin@confiance.com}
confiance.admin.full-name=${ADMIN_FULL_NAME:System Administrator}

# ===== ACTUATOR =====
management.endpoints.web.exposure.include=health,info

# ===== LOGGING =====
logging.level.com.confiance.gateway=DEBUG
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n
